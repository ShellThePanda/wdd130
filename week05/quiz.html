<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <form>
        <label for="q1">What type of form is this one?</label>
        <input type="text" name="q1" id="q1">

        <textarea type="textarea" name="q2" id="q2"></textarea>

        <label for="q3">What type of form is this one?</label>
        <select>
            <option value="" selected disabled>
                Select the correct one
            </option>
            <option value="select">
                Select
            </option>
            <option value="text">
                Text
            </option>
            <option value="button">
                Button
            </option>
            <option value="radio">
                Radio
            </option>
        </select>

        <label for="q4">What is the default font-size for most websites? *No need to add px</label>
        <input type="number" name="q4" id="q4">

        <input type="button" value="Submit Quiz">
