<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="This is the homepage for Dry Oar Rafting. This is where you can find the most basic info about our company">
    <meta name="author" content="Keon Serrano">
    <title>Homepage | Dry Oar Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <a href="/">
            <img src="images/rafting-logo.png" alt="Dry Oar Logo">
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero-image">
            <img class="hero-image__bg" src="images/about-us-hero.png">
            <div class="hero-container">
                <h2 class="hero-heading">Lorem Ipsum</h2>
                <a href="trips.html">Check out Trips</a>
            </div>
        </div>
        <div class="newsletter-form">
            <form class="contact-us__form">
                <h2 class="contact-us__title">Receive News from us!</h2>
                <div class="contact-us__name">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="Type full name here"
                      required>
                </div>
                <div class="contact-us__email">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email"
                      placeholder="Type email address here" required>
                </div>
                <div class="contact-us__submit">
                    <button type="submit">Send Message</button>
                </div>
            </form>
            <div class="grid-container">
                <div class="grid-cont__item">
                    <img src="images/placeholder-image.png" class="grid-cont__img"
                      alt="placeholder image">
                    <span class="grid-cont__text">Lorem Ipsum</span>
                </div>
                <div class="grid-cont__item">
                    <img src="images/placeholder-image.png" class="grid-cont__img"
                      alt="placeholder image">
                    <span class="grid-cont__text">Lorem Ipsum</span>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>© | 2026 | Dry Oar Rafting | Keon Serrano</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com" target="_blank">
                <img src="images/facebook-icon.png" alt="Facebook Icon">
            </a>
            <a href="twitter.com" target="_blank">
                <img src="images/x-icon.png" alt="X Icon">
            </a>
            <a href="https://www.instagram.com" target="_blank">
                <img src="images/instagram-icon.png" alt="X Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
